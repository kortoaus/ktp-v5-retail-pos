name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-2022

    defaults:
      run:
        working-directory: retail_pos_app

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: retail_pos_app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run package:win

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: retail-pos-windows-x64
          path: retail_pos_app/dist/*.exe
