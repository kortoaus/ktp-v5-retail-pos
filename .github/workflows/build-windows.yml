name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-2022

    defaults:
      run:
        working-directory: retail_pos_app

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: retail_pos_app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          if ($packageVersion -ne $tagVersion) {
            Write-Error "Release tag v$tagVersion does not match package.json version $packageVersion"
            exit 1
          }

      - name: Build Windows installer
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run package:win

      - name: Build and publish Windows installer
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package:win:publish

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: retail-pos-windows-x64
          path: |
            retail_pos_app/dist/*.exe
            retail_pos_app/dist/*.blockmap
            retail_pos_app/dist/latest*.yml
